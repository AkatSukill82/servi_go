<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- ✅ Viewport cross-platform : couvre les encoches iOS et Android -->

    <!-- PWA & Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ServiGo" />
    <meta name="application-name" content="ServiGo" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)" />

    <!-- SEO -->
    <meta name="description" content="Trouvez le bon professionnel, maintenant. Plombier, électricien, serrurier — près de chez vous." />
    <meta property="og:title" content="ServiGo" />
    <meta property="og:description" content="Mettez en relation particuliers et artisans qualifiés près de chez vous." />
    <meta property="og:type" content="website" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <link rel="apple-touch-icon" href="https://base44.com/logo_v2.svg" />
    <link rel="manifest" href="/manifest.json" />

    <title>ServiGo</title>
  <script>
  (function(){
    try {
      var v = localStorage.getItem('sg_dark');
      // Migration depuis l'ancienne clé
      if (v === null) {
        var old = localStorage.getItem('servigo_dark_mode');
        if (old === 'true') { v = '1'; localStorage.setItem('sg_dark', '1'); }
      }
      if (v === '1') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    } catch(e){}
  })();
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
