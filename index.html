<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA & Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ServiGo" />
    <meta name="application-name" content="ServiGo" />
    <meta name="theme-color" content="#ffffff" id="theme-color-meta" />

    <!-- SEO -->
    <meta name="description" content="Votre plateforme de confiance pour trouver des professionnels à domicile en Belgique." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="ServiGo" />
    <meta property="og:description" content="Votre plateforme de confiance pour trouver des professionnels à domicile en Belgique." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ServiGo" />
    <meta property="og:locale" content="fr_BE" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <link rel="apple-touch-icon" href="https://base44.com/logo_v2.svg" />
    <link rel="manifest" href="/manifest.json" />

    <title>ServiGo</title>

    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: #ffffff;
      }
    </style>

    <script>
    (function(){
      try {
        document.documentElement.classList.remove('dark');
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('sg_dark', '0');
      } catch(e){}
    })();
    </script>
  </head>
  <body style="margin:0;">
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <!-- Cordova bridge for IAP (cordova-plugin-purchase) — loaded AFTER React
         so it does not block the JS module bundle. waitForCdvPurchase() in
         useAppleIAP polls for window.CdvPurchase after React is running. -->
    <script src="cordova.js"></script>
  </body>
</html>
