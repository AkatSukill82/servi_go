<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- ✅ Viewport cross-platform : couvre les encoches iOS et Android -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA & Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ServiGo" />
    <meta name="application-name" content="ServiGo" />
    <meta name="theme-color" content="#1A1A2E" id="theme-color-meta" />

    <!-- SEO -->
    <meta name="description" content="Votre plateforme de confiance pour trouver des professionnels à domicile en Belgique. Plombiers, électriciens, déménageurs, serruriers et plus — trouvez le bon pro en quelques minutes." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="ServiGo" />
    <meta property="og:description" content="Votre plateforme de confiance pour trouver des professionnels à domicile en Belgique. Plombiers, électriciens, déménageurs, serruriers et plus — trouvez le bon pro en quelques minutes." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ServiGo" />
    <meta property="og:locale" content="fr_BE" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ServiGo" />
    <meta name="twitter:description" content="Votre plateforme de confiance pour trouver des professionnels à domicile en Belgique. Plombiers, électriciens, déménageurs, serruriers et plus — trouvez le bon pro en quelques minutes." />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <link rel="apple-touch-icon" href="https://base44.com/logo_v2.svg" />
    <link rel="manifest" href="/manifest.json" />

    <title>ServiGo</title>
    <style>html,body,#root{background-color:#ffffff;margin:0;padding:0;min-height:100vh;}@media(prefers-color-scheme:dark){html,body,#root{background-color:#000000;}}</style>
  <script>
  (function(){
    try {
      var v = localStorage.getItem('sg_dark');
      if (v === null) {
        var old = localStorage.getItem('servigo_dark_mode');
        if (old === 'true') { v = '1'; localStorage.setItem('sg_dark', '1'); }
        // Also detect system preference if no stored preference
        if (v === null && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          v = '1';
        }
      }
      var isDark = v === '1';
      if (isDark) {
        document.documentElement.classList.add('dark');
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.classList.remove('dark');
        document.documentElement.setAttribute('data-theme', 'light');
      }
      var meta = document.getElementById('theme-color-meta');
      if (meta) meta.setAttribute('content', isDark ? '#000000' : '#ffffff');
    } catch(e){}
  })();
  </script>
  </head>
  <body style="margin:0;">
    <div id="root"></div>
    <div id="splash" style="position:fixed;top:0;left:0;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" id="splash-logo" style="display:block;background:transparent;">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" fill="#FF6B35"/>
        <path d="M9 12l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div id="splash-title" style="font-size:28px;font-weight:700;margin-top:16px;font-family:system-ui,sans-serif;letter-spacing:-0.02em;">ServiGo</div>
      <div id="splash-spinner" style="margin-top:32px;width:32px;height:32px;border-radius:50%;animation:splashSpin 1s linear infinite;"></div>
      <style>
        @keyframes splashSpin{to{transform:rotate(360deg)}}
        #splash { background: #ffffff; }
        #splash-title { color: #0F172A; }
        /* coche toujours blanche sur fond orange */
        #splash-logo path:last-child { stroke: white; }
        #splash-spinner { border: 3px solid rgba(15,23,42,0.12); border-top-color: #FF6B35; }
        @media(prefers-color-scheme:dark){
          #splash { background: #000000 !important; }
          #splash-title { color: #ffffff; }
          #splash-spinner { border: 3px solid rgba(255,255,255,0.15); border-top-color: #FF6B35; }
        }
        html.dark #splash { background: #000000 !important; }
        html.dark #splash-title { color: #ffffff; }
        html.dark #splash-spinner { border: 3px solid rgba(255,255,255,0.15); border-top-color: #FF6B35; }
      </style>
    </div>

    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide splash once React has mounted
      window.__hideSplash = function() {
        var s = document.getElementById('splash');
        if (s) {
          s.style.transition = 'opacity 0.3s ease';
          s.style.opacity = '0';
          setTimeout(function(){ s.style.display = 'none'; }, 300);
        }
      };
    </script>
  </body>
</html>
